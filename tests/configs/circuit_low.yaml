# M2-T7/T8 配置：低 min_samples，少量失败请求即可把熔断打开。
callers:
  - credential: "m"
    caller_id: "svc:test"
    type: machine
    owner: "测试服务"
    priority: high
    rate_limit: { rate_per_sec: 1000, burst: 1000 }
    allowed_models: [solo]

backends:
  - { name: solo-bad, model: solo, address: "mock://x", behavior: failure }

thresholds:
  high_watermark: 1000
  low_watermark: 1

safeguard:
  retry:
    max_attempts: 1      # 每个请求 1 次调用 = 记 1 次失败，便于精确计数
    base_backoff_ms: 0
    max_backoff_ms: 0
  circuit:
    window_seconds: 100
    failure_rate: 0.5
    min_samples: 3       # 3 次失败即跳闸
    cooldown_seconds: 100
    half_open_probes: 1
  degrade:
    fallback_model: {}
    fallback_response: "兜底"
